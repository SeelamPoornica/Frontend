<!DOCTYPE html>
<html>
    <head>
        <title>Student Profile</title>
        <style>
            .card img{
                width: 200px;
                height: 200px;
            }
            .card{
                justify-content: center;
                display: block;
                text-align: center;
                border: 2px solid rgb(41,118,211);
                margin: 100px auto;
                width: 400px;
                padding: 20px;
            }
            .card button{
                background-color: rgb(41,118,211);
                color: white;
                border: none;
                height: 36px;
                width: 120px;
                border-radius: 10px;
                cursor: pointer;

                border-width: 5px;
            }
            .card button:hover{
                background-color: rgb(41,120,220);
            }
            .card button:active{
                opacity: 0.5;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <img src="image.jpg" alt="Student Image">
            <h2>Seelam Poornica</h2>
            <p>B.Tech - Computer Science and Engineering</p>
            <p>College : Vishnu Institute of Technology</p>
            <button>View Profile</button>
        </div>
    </body>
</html>
