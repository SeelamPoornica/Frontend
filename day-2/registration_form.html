<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>REGISTRATION FORM</title>
        <style>
            .container{
                width: 400px;
                padding: 10px;
                margin:100px auto;
                border: 2px solid black;
                border-radius: 5px;
                text-align: center;
            }
            form{
                margin-left: 40px;
                text-align: left;
            }
            button{
                background-color: green;
                color: white;
                height: 30px;
                width: 60px;
                border-radius: 4px;
                cursor: pointer;
            }
            button:hover{
                background-color: darkgreen;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 style="text-align: center;">REGISTRATION FORM</h1>
            <form type="post">
                <label for="name">Name </label>
                <input type="text" placeholder="Name" style="margin-left: 30px;" required><br><br>
                <label for="email">Email</label>
                <input type="email" placeholder="email" style="margin-left: 30px;" required><br><br>
                <label for="password">Password</label>
                <input type="password" placeholder="password" minlength="8" maxlength="12" style="margin-left: 5px;" required><br><br>
                <label for="gender">Gender : </label>
                <input type="radio" name="gender">
                <label for="male">Male</label>
                <input type="radio" name="gender">
                <label for="female">Female</label>
                <input type="radio" name="gender">
                <label for="others">Others</label><br><br>
                <button style="margin-left: 100px;">Submit</button>
            </form>
        </div>
    </body>
</html>
