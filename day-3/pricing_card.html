<!DOCTYPE html>
<html>
<head>
  <style>
    .card {
        margin: 100px auto;
      width: 250px;
      padding: 20px;
      margin: 20px;
      background: white;
      border-radius: 10px;   
      box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
      text-align: center;
      font-family: Arial, sans-serif;
    }
    .price {
      font-size: 24px;
      color: #007bff;
      margin: 10px 0;
    }
    .btn {
      display: inline-block;
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border-radius: 5px;
      text-decoration: none;
    }
    .btn:hover{
        background-color: blue;
    }
    .btn:active{
        opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Basic Plan</h2>
    <p class="price">$19/month</p>
    <p>✔ 5 Projects</p>
    <p>✔ Email Support</p>
    <a href="#" class="btn">Choose Plan</a>
  </div>
</body>
</html>
